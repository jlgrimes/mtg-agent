<!-- @dsCard group="Screens" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home screen</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400&display=swap");
      :root {
        --bg:#fafaf9; --card:#ffffff; --muted-bg:#f5f5f4; --fg:#1c1917; --muted:#78716c;
        --border:#e7e5e4; --primary:#1c1917; --r:#ef4444; --u:#3b82f6; --g:#22c55e; --b:#3f3f46; --w:#e3c75f;
        --sans:"Inter",system-ui,sans-serif; --mono:"Geist Mono",monospace;
      }
      * { box-sizing:border-box; }
      body { margin:0; background:#f0efed; font-family:var(--sans); color:var(--fg); padding:22px; }
      .app { display:flex; max-width:1000px; height:600px; margin:0 auto; background:var(--bg); border:1px solid var(--border); border-radius:16px; overflow:hidden; box-shadow:0 20px 50px rgba(0,0,0,.10); }
      .rail { width:222px; background:var(--card); border-right:1px solid var(--border); flex:none; }
      .rtop { padding:15px 16px; font-weight:600; font-size:13.5px; letter-spacing:-0.01em; }
      .rtop span { color:var(--muted); font-weight:400; }
      .new { margin:0 12px; width:calc(100% - 24px); background:var(--card); border:1px solid var(--border); color:var(--fg); border-radius:9px; padding:8px; font-size:13px; cursor:pointer; }
      .rlabel { font-family:var(--mono); font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); padding:14px 16px 4px; }
      .rchat { display:flex; align-items:center; gap:8px; margin:2px 8px; padding:7px 10px; border-radius:8px; font-size:12.5px; color:#44403c; }
      .rchat.on { background:var(--muted-bg); color:var(--fg); font-weight:500; }
      .rdot { width:6px; height:6px; border-radius:999px; flex:none; }
      .main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; position:relative; }
      .avatar { position:absolute; top:14px; right:16px; width:28px; height:28px; border-radius:999px; background:var(--muted-bg); border:1px solid var(--border); }
      .mark { font-size:30px; font-weight:700; letter-spacing:-0.03em; }
      .tag { color:var(--muted); font-size:13px; margin:6px 0 22px; }
      .composer { width:100%; max-width:470px; display:flex; gap:10px; align-items:center; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:7px 7px 7px 16px; box-shadow:0 4px 16px rgba(0,0,0,.05); }
      .composer input { flex:1; background:transparent; border:0; outline:0; color:var(--fg); font-size:14px; }
      .composer input::placeholder { color:var(--muted); }
      .send { width:36px; height:36px; border-radius:10px; border:0; background:var(--primary); color:#fff; font-size:15px; cursor:pointer; }
      .or { margin:22px 0 12px; font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
      .decks { display:flex; gap:10px; }
      .dk { width:108px; border-radius:11px; overflow:hidden; position:relative; border:1px solid var(--border); box-shadow:0 1px 2px rgba(0,0,0,.05); cursor:pointer; }
      .dk img { width:100%; aspect-ratio:16/11; object-fit:cover; display:block; }
      .dk .sc { position:absolute; inset:0; background:linear-gradient(180deg,transparent 45%,rgba(0,0,0,.7)); }
      .dk .nm { position:absolute; left:0; right:0; bottom:0; padding:7px 8px; color:#fff; font-size:10.5px; font-weight:600; text-shadow:0 1px 2px rgba(0,0,0,.6); display:flex; align-items:center; gap:5px; }
      .dk .nm .p { width:6px; height:6px; border-radius:999px; box-shadow:0 0 0 1px rgba(255,255,255,.8); flex:none; }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="rail">
        <div class="rtop">Commander <span>Copilot</span></div>
        <button class="new">＋ New chat</button>
        <div class="rlabel">Recent</div>
        <div class="rchat on"><span class="rdot" style="background:var(--r)"></span>Krenko budget upgrades</div>
        <div class="rchat"><span class="rdot" style="background:var(--g)"></span>Miirym mana curve</div>
        <div class="rchat"><span class="rdot" style="background:var(--u)"></span>Mana rocks under $2</div>
      </aside>
      <main class="main">
        <div class="avatar"></div>
        <div class="mark">Commander Copilot</div>
        <div class="tag">Your MTG Commander deckbuilding sidekick</div>
        <div class="composer">
          <input placeholder="Ask about your Commander deck — upgrades, mana curve, card ideas…" />
          <button class="send">↑</button>
        </div>
        <div class="or">— or analyze one of your decks —</div>
        <div class="decks">
          <div class="dk"><img alt="" src="https://cards.scryfall.io/art_crop/front/8/2/824b2d73-2151-4e5e-9f05-8f63e2bdcaa9.jpg?1730632010" /><div class="sc"></div><div class="nm"><span class="p" style="background:var(--r)"></span>Krenko</div></div>
          <div class="dk"><img alt="" src="https://cards.scryfall.io/art_crop/front/a/9/a934590b-5c70-4f07-af67-fbe817a99531.jpg?1674137589" /><div class="sc"></div><div class="nm"><span class="p" style="background:var(--u)"></span>Miirym</div></div>
          <div class="dk"><img alt="" src="https://cards.scryfall.io/art_crop/front/5/0/508b1442-bf2c-4ad6-9bcf-bd894e081ab6.jpg?1743207181" /><div class="sc"></div><div class="nm"><span class="p" style="background:var(--g)"></span>Meren</div></div>
        </div>
        <div style="margin-top:14px; font-size:12px; color:var(--muted); text-decoration:underline; text-underline-offset:2px;">📋 or paste a decklist (Moxfield, etc.)</div>
      </main>
    </div>
  </body>
</html>
