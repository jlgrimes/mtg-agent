<!-- @dsCard group="Screens" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home screen</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;600&family=Geist+Mono:wght@400&display=swap");
      :root {
        --bg:#0c0a09; --panel:#16130f; --muted-bg:#1c1917; --fg:#faf8f5; --muted:#a8a29e;
        --border:#2a2420; --gold:#e0b44a; --gold-soft:#f5d98b; --r:#d9543f; --u:#5b9bd5; --g:#4fa86a;
        --sans:"Inter",system-ui,sans-serif;
      }
      * { box-sizing:border-box; }
      body { margin:0; background:#070605; font-family:var(--sans); color:var(--fg); padding:24px; }
      .app { display:flex; max-width:1000px; height:600px; margin:0 auto; border:1px solid var(--border); border-radius:18px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,.5); }
      /* rail */
      .rail { width:230px; background:linear-gradient(180deg,var(--panel),var(--bg)); border-right:1px solid var(--border); flex:none; }
      .rtop { padding:14px; border-bottom:1px solid var(--border); font-family:"Cinzel",serif; font-weight:700; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--gold-soft); }
      .new { margin:12px; width:calc(100% - 24px); background:var(--muted-bg); border:1px solid var(--border); color:var(--fg); border-radius:10px; padding:8px; font-size:13px; cursor:pointer; }
      .rlabel { font-family:"Geist Mono",monospace; font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); padding:4px 16px; }
      .rchat { display:flex; align-items:center; gap:8px; margin:2px 8px; padding:8px 10px; border-radius:8px; font-size:12.5px; color:#d9d2c9; }
      .rchat.on { background:var(--muted-bg); box-shadow:inset 2px 0 0 var(--gold); color:var(--fg); }
      .rdot { width:6px; height:6px; border-radius:999px; flex:none; }
      /* main */
      .main { flex:1; background:radial-gradient(900px 380px at 50% -8%, rgba(224,180,74,.08), transparent 60%), var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px; position:relative; }
      .badge { position:absolute; top:14px; right:16px; width:30px; height:30px; border-radius:999px; background:var(--muted-bg); border:1px solid var(--border); }
      .mark { font-family:"Cinzel",serif; font-weight:700; font-size:30px; letter-spacing:.13em; text-transform:uppercase; background:linear-gradient(180deg,var(--gold-soft),var(--gold)); -webkit-background-clip:text; background-clip:text; color:transparent; }
      .tag { color:var(--muted); font-size:13px; margin:8px 0 26px; letter-spacing:.03em; }
      .composer { width:100%; max-width:480px; display:flex; gap:10px; align-items:center; background:var(--panel); border:1px solid var(--border); border-radius:15px; padding:7px 7px 7px 16px; box-shadow:0 14px 40px rgba(0,0,0,.45); }
      .composer input { flex:1; background:transparent; border:0; outline:0; color:var(--fg); font-size:14px; }
      .composer input::placeholder { color:var(--muted); }
      .send { width:36px; height:36px; border-radius:10px; border:0; background:linear-gradient(180deg,var(--gold-soft),var(--gold)); color:#1a1206; font-size:15px; cursor:pointer; }
      .chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:18px; max-width:480px; }
      .chip { background:var(--muted-bg); border:1px solid var(--border); border-radius:999px; padding:6px 12px; font-size:12px; color:var(--muted); }
      .deck { margin-top:24px; font-family:"Geist Mono",monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="rail">
        <div class="rtop">✦ Copilot</div>
        <button class="new">＋ New chat</button>
        <div class="rlabel">Recent</div>
        <div class="rchat on"><span class="rdot" style="background:var(--r)"></span>Krenko budget upgrades</div>
        <div class="rchat"><span class="rdot" style="background:var(--g)"></span>Miirym mana curve</div>
        <div class="rchat"><span class="rdot" style="background:var(--u)"></span>Mana rocks under $2</div>
      </aside>
      <main class="main">
        <div class="badge"></div>
        <div class="mark">Commander Copilot</div>
        <div class="tag">Your MTG Commander deckbuilding sidekick</div>
        <div class="composer">
          <input placeholder="Ask about your Commander deck — upgrades, mana curve, card ideas…" />
          <button class="send">↑</button>
        </div>
        <div class="chips">
          <span class="chip">What's a good land count?</span>
          <span class="chip">Budget mana rocks for Golgari</span>
          <span class="chip">Spicy cards for Atraxa</span>
        </div>
        <div class="deck">— or analyze one of your decks —</div>
      </main>
    </div>
  </body>
</html>
