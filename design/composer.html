<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Composer &amp; active deck</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400&display=swap");
      :root {
        --bg:#0c0a09; --panel:#16130f; --muted-bg:#1c1917; --fg:#faf8f5; --muted:#a8a29e;
        --border:#2a2420; --gold:#e0b44a; --gold-soft:#f5d98b; --sans:"Inter",system-ui,sans-serif;
      }
      * { box-sizing:border-box; }
      body { margin:0; background:var(--bg); color:var(--fg); font-family:var(--sans); padding:44px; }
      .wrap { max-width:560px; margin:0 auto; display:grid; gap:12px; }
      .banner { display:flex; align-items:center; gap:10px; background:var(--muted-bg); border:1px solid var(--border); border-radius:12px; padding:10px 14px; font-size:13.5px; }
      .banner .em { font-size:15px; }
      .banner b { color:var(--gold-soft); }
      .banner .cmd { color:var(--muted); }
      .banner .clear { margin-left:auto; font-family:"Geist Mono",monospace; font-size:11px; color:var(--muted); cursor:pointer; }
      .composer { display:flex; align-items:center; gap:10px; background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:8px 8px 8px 18px; box-shadow:0 10px 40px rgba(0,0,0,.4); }
      .composer input { flex:1; background:transparent; border:0; outline:0; color:var(--fg); font-family:var(--sans); font-size:14.5px; }
      .composer input::placeholder { color:var(--muted); }
      .send { width:38px; height:38px; border-radius:11px; border:0; cursor:pointer; background:linear-gradient(180deg,var(--gold-soft),var(--gold)); color:#1a1206; font-size:16px; display:grid; place-items:center; box-shadow:0 4px 12px rgba(224,180,74,.25); }
      .hint { text-align:center; font-family:"Geist Mono",monospace; font-size:10.5px; color:var(--muted); letter-spacing:.08em; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="banner">
        <span class="em">📋</span>
        <span>Active deck: <b>Krenko, Mob Boss</b> <span class="cmd">· Goblin aristocrats</span></span>
        <span class="clear">Clear</span>
      </div>
      <div class="composer">
        <input placeholder="Ask anything about “Krenko” — cuts, curve, upgrades…" />
        <button class="send">↑</button>
      </div>
      <div class="hint">DECK CONTEXT ATTACHED · POWERED BY EDHREC + SCRYFALL</div>
    </div>
  </body>
</html>
