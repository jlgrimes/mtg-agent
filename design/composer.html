<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Composer &amp; active deck</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400&display=swap");
      :root {
        --bg:#fafaf9; --card:#ffffff; --muted-bg:#f5f5f4; --fg:#1c1917; --muted:#78716c;
        --border:#e7e5e4; --primary:#1c1917; --r:#ef4444; --sans:"Inter",system-ui,sans-serif;
      }
      * { box-sizing:border-box; }
      body { margin:0; background:var(--bg); color:var(--fg); font-family:var(--sans); padding:44px; }
      .wrap { max-width:560px; margin:0 auto; display:grid; gap:12px; }
      .banner { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:9px 13px; font-size:13.5px; }
      .banner .thumb { width:30px; height:24px; border-radius:6px; object-fit:cover; flex:none; }
      .banner b { font-weight:600; }
      .banner .cmd { color:var(--muted); }
      .banner .clear { margin-left:auto; font-family:"Geist Mono",monospace; font-size:11px; color:var(--muted); cursor:pointer; }
      .composer { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:8px 8px 8px 18px; box-shadow:0 4px 18px rgba(0,0,0,.05); }
      .composer input { flex:1; background:transparent; border:0; outline:0; color:var(--fg); font-family:var(--sans); font-size:14.5px; }
      .composer input::placeholder { color:var(--muted); }
      .send { width:38px; height:38px; border-radius:11px; border:0; cursor:pointer; background:var(--primary); color:#fff; font-size:16px; display:grid; place-items:center; }
      .hint { text-align:center; font-family:"Geist Mono",monospace; font-size:10px; color:var(--muted); letter-spacing:.06em; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="banner">
        <img class="thumb" alt="" src="https://cards.scryfall.io/art_crop/front/8/2/824b2d73-2151-4e5e-9f05-8f63e2bdcaa9.jpg?1730632010" />
        <span>Active deck: <b>Krenko, Mob Boss</b> <span class="cmd">· Goblin aristocrats</span></span>
        <span class="clear">Clear</span>
      </div>
      <div class="composer">
        <input placeholder="Ask anything about “Krenko” — cuts, curve, upgrades…" />
        <button class="send">↑</button>
      </div>
      <div class="hint">DECK CONTEXT ATTACHED · POWERED BY EDHREC + SCRYFALL</div>
    </div>
  </body>
</html>
