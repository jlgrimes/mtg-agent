<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Conversation sidebar</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400&display=swap");
      :root {
        --bg:#fafaf9; --card:#ffffff; --muted-bg:#f5f5f4; --fg:#1c1917; --muted:#78716c;
        --border:#e7e5e4; --u:#3b82f6; --r:#ef4444; --g:#22c55e; --b:#3f3f46; --w:#e3c75f;
        --sans:"Inter",system-ui,sans-serif;
      }
      * { box-sizing:border-box; }
      body { margin:0; background:#f0efed; font-family:var(--sans); padding:30px; display:flex; justify-content:center; }
      .rail { width:264px; background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,.06); }
      .top { padding:15px 16px; border-bottom:1px solid var(--border); font-weight:600; font-size:13.5px; }
      .top span { color:var(--muted); font-weight:400; }
      .new { margin:12px; width:calc(100% - 24px); display:flex; align-items:center; justify-content:center; gap:8px; background:var(--card); border:1px solid var(--border); color:var(--fg); border-radius:10px; padding:9px; font-size:13.5px; font-weight:500; cursor:pointer; }
      .new:hover { background:var(--muted-bg); }
      .label { font-family:"Geist Mono",monospace; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); padding:6px 18px; }
      .list { padding:4px 8px 12px; display:grid; gap:2px; }
      .chat { display:flex; align-items:center; gap:8px; padding:9px 10px; border-radius:9px; font-size:13.5px; color:#44403c; cursor:pointer; }
      .chat:hover { background:var(--muted-bg); }
      .chat.active { background:var(--muted-bg); color:var(--fg); font-weight:500; }
      .chat .pip { width:6px; height:6px; border-radius:999px; flex:none; }
      .truncate { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    </style>
  </head>
  <body>
    <div class="rail">
      <div class="top">Commander <span>Copilot</span></div>
      <button class="new">＋ New chat</button>
      <div class="label">Recent</div>
      <div class="list">
        <div class="chat active"><span class="pip" style="background:var(--r)"></span><span class="truncate">Krenko goblins — budget upgrades</span></div>
        <div class="chat"><span class="pip" style="background:var(--g)"></span><span class="truncate">Miirym dragons mana curve</span></div>
        <div class="chat"><span class="pip" style="background:linear-gradient(90deg,var(--w),var(--u),var(--b))"></span><span class="truncate">Atraxa superfriends — power level</span></div>
        <div class="chat"><span class="pip" style="background:var(--u)"></span><span class="truncate">Best budget mana rocks under $2</span></div>
        <div class="chat"><span class="pip" style="background:var(--g)"></span><span class="truncate">Golgari cheap card draw</span></div>
      </div>
    </div>
  </body>
</html>
