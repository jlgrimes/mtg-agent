<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buttons &amp; Chips</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400&display=swap");
      :root {
        --bg:#fafaf9; --card:#ffffff; --muted-bg:#f5f5f4; --fg:#1c1917; --muted:#78716c;
        --border:#e7e5e4; --primary:#1c1917; --sans:"Inter",system-ui,sans-serif;
      }
      * { box-sizing:border-box; }
      body { margin:0; background:var(--bg); color:var(--fg); font-family:var(--sans); padding:40px; }
      .wrap { max-width:680px; margin:0 auto; display:grid; gap:26px; }
      h3 { font-family:"Geist Mono",monospace; font-size:11px; text-transform:uppercase; letter-spacing:.16em; color:var(--muted); margin:0 0 14px; }
      .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
      button { font-family:var(--sans); font-size:14px; font-weight:500; border-radius:10px; padding:10px 18px; border:1px solid transparent; cursor:pointer; transition:.15s; }
      .primary { background:var(--primary); color:#fff; }
      .primary:hover { opacity:.9; }
      .secondary { background:var(--card); color:var(--fg); border-color:var(--border); }
      .secondary:hover { background:var(--muted-bg); }
      .ghost { background:transparent; color:var(--muted); }
      .ghost:hover { color:var(--fg); background:var(--muted-bg); }
      .sm { padding:6px 12px; font-size:12.5px; border-radius:8px; }
      .pill { background:var(--card); border:1px solid var(--border); color:var(--muted); border-radius:999px; padding:7px 14px; font-size:12.5px; cursor:pointer; }
      .pill:hover { color:var(--fg); border-color:#d6d3d1; }
      .seg { display:inline-flex; border:1px solid var(--border); border-radius:999px; overflow:hidden; background:var(--card); }
      .seg span { padding:6px 14px; font-size:12.5px; color:var(--muted); }
      .seg span.on { background:var(--primary); color:#fff; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div>
        <h3>Buttons</h3>
        <div class="row">
          <button class="primary">Sign in to start</button>
          <button class="secondary">Connect Archidekt</button>
          <button class="ghost">Disconnect</button>
          <button class="primary sm">＋ New chat</button>
          <button class="secondary sm">Send</button>
        </div>
      </div>
      <div>
        <h3>Starter prompt chips</h3>
        <div class="row">
          <span class="pill">What should I cut, and why?</span>
          <span class="pill">Is my mana curve okay?</span>
          <span class="pill">Suggest 5 upgrades</span>
        </div>
      </div>
      <div>
        <h3>Power-level segment</h3>
        <div class="seg"><span>Casual</span><span class="on">Focused</span><span>Optimized</span><span>cEDH</span></div>
      </div>
    </div>
  </body>
</html>
